<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script type="module" src="app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f4f4f0; color: #1a1a1a; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }
    #app { max-width: 480px; margin: 0 auto; padding: 28px 16px 48px; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .header button { background: none; border: none; color: #aaa; font-size: 26px; cursor: pointer; padding: 4px 12px; line-height: 1; }
    .header button:hover { color: #555; }
    .header-center { text-align: center; }
    .header-title { font-size: 28px; font-weight: 900; letter-spacing: 0.02em; color: #1a1a1a; }

    .weekday-row { display: grid; grid-template-columns: repeat(7, 1fr) 88px; margin-bottom: 4px; }
    .weekday-row div { text-align: center; font-size: 11px; font-weight: 500; color: #bbb; padding-bottom: 6px; }
    .weekday-row .sat { color: #7ab0d4; }
    .weekday-row .sun { color: #d47a7a; }
    .weekday-row .wtotal { color: #aaa; font-size: 10px; }

    .week-row { display: grid; grid-template-columns: repeat(7, 1fr) 88px; border-top: 1px solid #e8e8e4; }
    .day-cell { min-height: 60px; padding: 7px 5px 5px; cursor: pointer; transition: background 0.12s; border-radius: 4px; }
    .day-cell:hover { background: #eeeee8; }
    .day-cell.today { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .day-cell.empty { cursor: default; }
    .day-cell.empty:hover { background: transparent; }

    .day-num { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 3px; }
    .day-num.today { color: #1a1a1a; }
    .day-num.sat { color: #7ab0d4; }
    .day-num.sun { color: #d47a7a; }

    .day-amount { font-size: 10px; font-weight: 500; color: #e07840; line-height: 1.3; }

    .week-total { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #ccc; border-left: 1px solid #e8e8e4; padding: 0 4px; }
    .week-total.has-amount { color: #5a9a6a; }

    .month-total-wrap { margin-top: 20px; border-top: 2px solid #e0e0da; padding-top: 16px; display: flex; justify-content: space-between; align-items: baseline; }
    .month-total-label { font-size: 12px; font-weight: 500; letter-spacing: 0.1em; color: #aaa; }
    .month-total-amount { font-size: 26px; font-weight: 900; color: #ddd; }
    .month-total-amount.has-amount { color: #e07840; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal { background: #fff; border-radius: 16px 16px 0 0; padding: 24px 24px 40px; width: 100%; max-width: 480px; box-shadow: 0 -4px 24px rgba(0,0,0,0.1); }
    .modal-date { font-size: 13px; font-weight: 700; color: #888; margin-bottom: 12px; }
    .modal input { width: 100%; background: #f4f4f0; border: none; border-radius: 8px; padding: 14px 16px; font-size: 20px; font-weight: 700; color: #1a1a1a; font-family: inherit; outline: none; margin-bottom: 12px; }
    .modal-buttons { display: flex; gap: 8px; }
    .btn-cancel { flex: 1; padding: 12px; background: #f0f0ec; border: none; border-radius: 8px; color: #999; font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 500; }
    .btn-save { flex: 2; padding: 12px; background: #1a1a1a; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 700; }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #bbb; font-size: 13px; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div id="app"><div class="loading">読み込み中...</div></div>
</body>
</html>
