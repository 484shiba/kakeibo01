<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿</title>
  <script type="module" src="app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #e8e0d4; font-family: 'Georgia', serif; min-height: 100vh; }
    #app { max-width: 480px; margin: 0 auto; padding: 24px 16px 48px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .header button { background: none; border: none; color: #9a8878; font-size: 24px; cursor: pointer; padding: 4px 12px; }
    .header-center { text-align: center; }
    .header-sub { font-size: 11px; letter-spacing: 0.25em; color: #6a5a4a; text-transform: uppercase; margin-bottom: 2px; }
    .header-title { font-size: 24px; font-weight: normal; letter-spacing: 0.05em; }
    .weekday-row { display: grid; grid-template-columns: repeat(7, 1fr) 80px; margin-bottom: 4px; }
    .weekday-row div { text-align: center; font-size: 10px; letter-spacing: 0.1em; color: #6a5a4a; padding-bottom: 6px; }
    .weekday-row div.sat { color: #4a7a9b; }
    .weekday-row div.sun { color: #9b4a4a; }
    .weekday-row div.wtotal { color: #5a7a5a; }
    .week-row { display: grid; grid-template-columns: repeat(7, 1fr) 80px; margin-bottom: 3px; border-top: 1px solid #1e1e1e; }
    .day-cell { min-height: 56px; padding: 6px 4px 4px; cursor: pointer; border-radius: 3px; transition: background 0.15s; }
    .day-cell:hover { background: #1a1612; }
    .day-cell.today { background: #161410; }
    .day-cell.empty { cursor: default; }
    .day-num { font-size: 11px; color: #6a5a4a; margin-bottom: 3px; }
    .day-num.today { color: #c8a878; font-weight: bold; }
    .day-num.sat { color: #4a7a9b; }
    .day-num.sun { color: #9b4a4a; }
    .day-amount { font-size: 10px; color: #c8a060; line-height: 1.2; }
    .week-total { display: flex; align-items: center; justify-content: center; font-size: 11px; color: #2a2a2a; border-left: 1px solid #1e1e1e; padding-left: 4px; }
    .week-total.has-amount { color: #7a9a6a; }
    .month-total { margin-top: 20px; border-top: 1px solid #2a2a2a; padding-top: 16px; display: flex; justify-content: space-between; align-items: baseline; }
    .month-total-label { font-size: 11px; letter-spacing: 0.15em; color: #6a5a4a; }
    .month-total-amount { font-size: 22px; color: #3a3a3a; }
    .month-total-amount.has-amount { color: #c8a060; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal { background: #181410; border: 1px solid #2e2820; border-radius: 12px 12px 0 0; padding: 24px 24px 40px; width: 100%; max-width: 480px; }
    .modal-date { font-size: 12px; color: #6a5a4a; letter-spacing: 0.1em; margin-bottom: 12px; }
    .modal input { width: 100%; background: #0f0f0f; border: 1px solid #2e2820; border-radius: 6px; padding: 12px 14px; font-size: 18px; color: #e8e0d4; font-family: inherit; outline: none; margin-bottom: 12px; }
    .modal-buttons { display: flex; gap: 8px; }
    .btn-cancel { flex: 1; padding: 10px; background: none; border: 1px solid #2e2820; border-radius: 6px; color: #6a5a4a; font-size: 14px; font-family: inherit; cursor: pointer; }
    .btn-save { flex: 2; padding: 10px; background: #c8a060; border: none; border-radius: 6px; color: #0f0f0f; font-size: 14px; font-family: inherit; cursor: pointer; font-weight: bold; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #888; font-size: 14px; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div id="app"><div class="loading">読み込み中...</div></div>
</body>
</html>
